<head>

    <style>
        /* General Styling */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* Navbar - Similar to Main Page */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: center;
            /* Center all items */
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            padding: 0 20px;
            /* background: rgba(255, 255, 255, 0.9); */
            background-color: #fff;

            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .navbar a {
            position: absolute;
            left: 20px;
            color: #027aca;
            font-weight: 600;
            text-decoration: none;
            font-size: 18px;
        }

        .logo {
            display: block;
            height: 40px;

            margin-right: 38px;

        }

        /* Centered Container for Bill Splitter */
        .container {
            max-width: 420px;
            margin: 170px auto 40px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            animation: fadeIn 1s ease-in-out;

        }

        #numPeople {
            width: calc(100% - 24px);
            /* Adjust width to fit properly */
            margin: 10px 0;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            /* Ensures number stays centered */
        }


        /* Inputs & Buttons */
        input,
        button {
            margin: 10px 0;
            padding: 12px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        /* Error Input Field */
        /* Light red highlight for invalid input */
        .input-error {
            border: 2px solid red !important;
            background-color: #ffecec !important;
            /* Light red background */
        }


        /* 2nd navbar */
        .selector {
            background: linear-gradient(-45deg, #0044ff, #0088ff, #001b6b, #0029b2);
            background-size: 400% 400%;
            animation: gradientAnimation 6s ease-in-out infinite;
            position: fixed;
            top: 60px;
            width: 100%;
            z-index: 999;
            padding: 10px 0;
            /* More spacing for better touch accessibility */
        }

        .selector ul {
            display: flex;
            justify-content: space-around;
            /* Evenly spaced for better mobile view */
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .selector ul li {
            list-style: none;
            padding: 12px 20px;
            /* Bigger touch area for mobile users */
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
                filter: brightness(1);
            }

            25% {
                background-position: 50% 100%;
                filter: brightness(1.2);
                /* Makes it glow slightly */
            }

            50% {
                background-position: 100% 50%;
                filter: brightness(0.9);
                /* Slight dark effect */
            }

            75% {
                background-position: 50% 0%;
                filter: brightness(1.2);
                /* Brightens again */
            }

            100% {
                background-position: 0% 50%;
                filter: brightness(1);
            }
        }

        .selector ul li:active {
            background: rgb(71, 71, 252);
            border-radius: 14px;
        }

        .selector ul li:hover {
            background: rgb(71, 71, 252);
            border-radius: 14px;
        }

        /* Make text smaller on mobile */
        @media (max-width: 768px) {
            .selector ul li {
                font-size: 15px;
                /* Smaller text on mobile */
                padding: 10px 12px;
                /* Adjust padding for smaller screens */
            }
        }

        @media (max-width: 480px) {
            .selector ul li {
                font-size: 12px;
                /* Further reduced for very small screens */
                padding: 8px 10px;
                /* Ensure comfortable tap targets */
            }
        }


        /* Error Message */
       .input-error {
    border: 2px solid red !important;
    background-color: #ffecec !important;
}


        input:focus {
            border-color: #027aca;
            outline: none;
            box-shadow: 0px 4px 10px rgba(0, 122, 202, 0.2);
        }

        .person-entry {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        /* Buttons */
        button {
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0px 4px 10px rgba(255, 126, 95, 0.3);
        }

        button:hover {
            background: linear-gradient(45deg, #feb47b, #ff7e5f);
            transform: scale(1.05);
            box-shadow: 0px 6px 15px rgba(255, 126, 95, 0.5);
        }

        /* Results Section */
        .results-container {
            text-align: left;
            margin-top: 15px;
        }

        .result-item {
            background: #d4edda;
            padding: 12px;
            border-radius: 8px;
            margin: 5px 0;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .result-item:hover {
            transform: scale(1.05);
        }

        /* Fade-in Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer Styling */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            box-shadow: 0px -3px 10px rgba(0, 0, 0, 0.1);
            /* Soft shadow on top */
            z-index: 1000;
        }

        /* Footer Icons & Text */
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Icons */
        .footer-item i {
            font-size: 22px;
            margin-bottom: 3px;
        }

        /* Hover Effect */
        .footer-item:hover {
            color: #027aca;
            /* Slight color change on hover */
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .footer-item {
                font-size: 16px;
            }

            .footer-item i {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .footer {
                padding: 8px 0;
            }

            .footer-item {
                font-size: 12px;
            }

            .footer-item i {
                font-size: 16px;
            }
        }

        /* History Section Styling */
        .

        /* History Section */
        .history-container {
            max-width: 450px;
            margin: 100px auto 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        /* History Card Styling */
        /* History Section */
        .history-container {
            max-width: 450px;
            margin: 100px auto 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

    

       /* History Card */
.history-card {
    position: relative;
    background: #ffffff;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0px 3px 10px rgba(0, 0, 0, 0.1);
    border-left: 5px solid #0044ff;
    text-align: left;
}






        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            box-shadow: 0px -3px 10px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        /* Footer Items */
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Footer Icons */
        .footer-item i {
            font-size: 22px;
            margin-bottom: 3px;
        }

        /* Hover Effect */
        .footer-item:hover {
            color: #027aca;
        }

        /* Responsive Footer */
        @media (max-width: 768px) {
            .footer-item {
                font-size: 14px;

            .footer-item i {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .footer {

            .footer-item {

    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="index.html">&#8592; Home</a>
        <img src="SPLIT (4)-Photoroom (1)-Photoroom.png" alt="Splitly" class="logo">
    </div>

    <div class="selector">
        <ul>
            <li>Expense Splitter</li>
            <li>Random Splitter</li>
            <li>Create Group</li>
        </ul>
    </div>

    <!-- Bill Splitter Section -->
    <div class="container">
        <h2>Bill Splitter</h2>
        <label>Number of People:</label>
        <input type="number" id="numPeople" min="2" value="2">
        <button onclick="createInputs()">Next</button>
        <div id="inputs"></div>
        <button onclick="calculateSplit()">Calculate</button>
        <h3>Total Expense Per Person:</h3>
        <div id="totalExpense"></div>
        <h3>Results</h3>
        <div id="results" class="results-container"></div>
    </div>




    <footer class="footer">
        <div class="footer-item" onclick="showHome()">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        <div class="footer-item" onclick="showHistory()">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>History</span>
        </div>
    </footer>

    <!-- History Section (Initially Hidden) -->
    <div id="historySection" class="history-container" style="display: none;">
        <h2>History</h2>
        <button onclick="clearHistory()">Clear History</button>
        <div id="historyResults"></div>
    </div>


    <!-- FontAwesome for Icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>




    <!-- JavaScript for Split Logic -->
    <script>
        function createInputs() {
            let num = document.getElementById("numPeople").value;
            let inputsDiv = document.getElementById("inputs");
            inputsDiv.innerHTML = "";

            for (let i = 0; i < num; i++) {
                let div = document.createElement("div");
                div.classList.add("person-entry");
                div.innerHTML = `
            <input type="text" placeholder="Name" id="name${i}">
            <input type="number" placeholder="Amount Paid" id="paid${i}" min="0">
        `;
                inputsDiv.appendChild(div);
            }
        }


        function calculateSplit() {
            let num = document.getElementById("numPeople").value;
            let people = [];
            let totalPaid = 0;
            let validInput = true;

            for (let i = 0; i < num; i++) {
                let nameField = document.getElementById(`name${i}`);
                let paidField = document.getElementById(`paid${i}`);
                let name = nameField.value.trim();
                let paid = parseFloat(paidField.value) || 0;

                // Reset previous errors
                nameField.classList.remove("input-error");
                paidField.classList.remove("input-error");

                // Check for empty name
                if (name === "") {
                    nameField.classList.add("input-error");
                    validInput = false;
                }

                // Check for empty amount
                if (paidField.value === "") {
                    paidField.classList.add("input-error");
                    validInput = false;
                }

                if (validInput) {
                    people.push({ name, paid });
                    totalPaid += paid;
                }
            }

            if (!validInput) return; // Stop function if inputs are invalid

            let perPerson = totalPaid / num;
            let resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = `<h3>Total Per Person: ₹${perPerson.toFixed(2)}</h3>`;

            let transactions = [];
            people.forEach(p => p.balance = p.paid - perPerson);
            people.sort((a, b) => a.balance - b.balance);

            let i = 0, j = people.length - 1;
            while (i < j) {
                let owe = -people[i].balance;
                let receive = people[j].balance;
                let amount = Math.min(owe, receive);

                let transaction = `<b>${people[i].name}</b> pays ₹${amount.toFixed(2)} to <b>${people[j].name}</b>`;
                transactions.push(transaction);

                resultsDiv.innerHTML += `<div class='result-item'>${transaction}</div>`;
                people[i].balance += amount;
                people[j].balance -= amount;

                if (people[i].balance === 0) i++;
                if (people[j].balance === 0) j--;
            }

            setTimeout(() => {
                resultsDiv.scrollIntoView({ behavior: "smooth" });
            }, 200);

            let history = JSON.parse(localStorage.getItem("splitHistory")) || [];
            history.push({
                id: Date.now(),
                date: new Date().toLocaleString(),
                perPerson: perPerson.toFixed(2),
                transactions
            });

            localStorage.setItem("splitHistory", JSON.stringify(history));
        }



// hidden navs

        function showHistory() {
    document.getElementById("historySection").style.display = "block";
    document.querySelector(".container").style.display = "none"; // Hide Bill Splitter
    document.querySelector(".selector").style.display = "none"; // Hide Blue Navbar
    loadHistory(); // Load saved history
}

function showHome() {
    document.getElementById("historySection").style.display = "none";
    document.querySelector(".container").style.display = "block"; // Show Bill Splitter
    document.querySelector(".selector").style.display = "flex"; // Show Blue Navbar Again
}

        // Function to Load History from Local Storage
        function loadHistory() {
    let historyResults = document.getElementById("historyResults");
    historyResults.innerHTML = "";

    let history = JSON.parse(localStorage.getItem("splitHistory")) || [];

    if (history.length === 0) {
        historyResults.innerHTML = "<p>No history found.</p>";
        return;
    }

    history.forEach(entry => {
        let historyItem = `<div class="history-card">
            <h3>${entry.date}</h3>
            <p><b>Each Person Should Pay:</b> ₹${entry.perPerson}</p>
            <ul>${entry.transactions.map(t => `<li>${t}</li>`).join("")}</ul>
        </div>`;
        historyResults.innerHTML += historyItem;
    });
}











function clearHistory() {
    localStorage.removeItem("splitHistory");
    loadHistory(); // Refresh history display
}





    </script>



</body>

</html>
